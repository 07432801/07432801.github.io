<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <!-- Comet head glow -->
    <radialGradient id="headGlow" cx="0.85" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="15%" stop-color="#ffe8c0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#f0a050" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <!-- Trail gradient -->
    <linearGradient id="trailGrad" x1="1" y1="0.3" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="8%" stop-color="#ffe8c0" stop-opacity="0.8"/>
      <stop offset="25%" stop-color="#f0a050" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <!-- Second trail (split comet) -->
    <linearGradient id="trailGrad2" x1="1" y1="0.3" x2="0" y2="0.6">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.7"/>
      <stop offset="10%" stop-color="#ffd0e0" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#e8919c" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main comet trail (split) -->
  <path d="M510,120 C430,128 320,140 200,165 C130,178 80,195 30,210"
        stroke="url(#trailGrad)" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)"/>
  <path d="M505,125 C425,135 315,150 195,178 C125,193 75,212 25,230"
        stroke="url(#trailGrad2)" stroke-width="2" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- Comet head -->
  <circle cx="510" cy="120" r="18" fill="url(#headGlow)" filter="url(#glow)"/>
  <circle cx="510" cy="120" r="5" fill="#fff"/>

  <!-- Scattered star particles -->
  <circle cx="480" cy="105" r="1.5" fill="#ffe8c0" opacity="0.7"/>
  <circle cx="460" cy="130" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="440" cy="115" r="1.2" fill="#f0a050" opacity="0.4"/>
  <circle cx="390" cy="140" r="1" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="350" cy="155" r="0.8" fill="#fff" opacity="0.25"/>
  <circle cx="300" cy="170" r="0.7" fill="#ffe8c0" opacity="0.2"/>
  <circle cx="250" cy="180" r="0.6" fill="#a78bfa" opacity="0.15"/>
  <circle cx="455" cy="108" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="125" r="0.9" fill="#ffe8c0" opacity="0.4"/>

  <!-- Tiny sparkles -->
  <circle cx="495" cy="100" r="1" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="145" r="0.8" fill="#ffe8c0" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="430" cy="110" r="0.7" fill="#fff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.3s" repeatCount="indefinite"/>
  </circle>
</svg>
