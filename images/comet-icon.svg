<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="cometIconGlow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="30%" stop-color="#ffe8c0"/>
      <stop offset="70%" stop-color="#f0a050" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Trail -->
  <line x1="44" y1="16" x2="8" y2="38" stroke="url(#cometIconGlow)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="20" x2="12" y2="42" stroke="#a78bfa" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <!-- Head -->
  <circle cx="44" cy="16" r="8" fill="url(#cometIconGlow)"/>
  <circle cx="44" cy="16" r="2.5" fill="#fff"/>
  <!-- Sparkle -->
  <circle cx="36" cy="22" r="1" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" repeatCount="indefinite"/>
